project_id = "nqggizilkxudjdyxdsnl"

[auth]
site_url = "https://knobb.netlify.app"
additional_redirect_urls = [
  "https://knobb.netlify.app/**",
  "http://localhost:8080/**",
  "http://127.0.0.1:8080/**",
  "http://localhost:5173/**",
  "http://127.0.0.1:5173/**",
]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email.template.confirmation]
subject = "Confirm your Knobb account"
content_path = "./supabase/templates/confirmation.html"

[auth.external.google]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GOOGLE_SECRET)"
skip_nonce_check = false

[auth.external.discord]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_DISCORD_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_DISCORD_SECRET)"
