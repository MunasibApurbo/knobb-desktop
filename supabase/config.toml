project_id = "qjrmwnivhcogwgaxzges"

[auth]
site_url = "https://knobb.netlify.app"
additional_redirect_urls = [
  "https://knobb.netlify.app/**",
  "http://localhost:8080/**",
  "http://127.0.0.1:8080/**",
]

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = false
max_frequency = "1m0s"
otp_length = 8
otp_expiry = 3600

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.email.template.confirmation]
subject = "Confirm your Knobb account"
content_path = "./supabase/templates/confirmation.html"
