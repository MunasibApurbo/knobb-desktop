appId: fm.knobb.desktop
productName: Knobb Desktop
directories:
  output: release/desktop
files:
  - dist/**/*
  - desktop/**/*
  - scripts/discord-presence-bridge-core.mjs
  - public/brand/**/*
  - discord-presence.bridge.json
  - discord-presence.bridge.example.json
extraMetadata:
  main: desktop/knobb/main.mjs
publish:
  provider: github
  owner: MunasibApurbo
  repo: knobb-desktop
  releaseType: release
  vPrefixedTagName: true
mac:
  artifactName: Knobb-Desktop-macOS.${ext}
  category: public.app-category.music
  icon: desktop/knobb/assets/knobb.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  singleArchFiles: dist/404.html
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
dmg:
  artifactName: Knobb-Desktop-macOS.${ext}
win:
  artifactName: Knobb-Desktop-Setup.${ext}
  icon: public/brand/logo-k-black-square-512.png
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: Knobb-Desktop-Setup.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: false
  perMachine: false
