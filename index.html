<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KNOBB</title>
    <meta
      name="description"
      content="KNOBB is a modern music app for playlists, discovery, shared listening, and direct-source archives."
    />
    <meta
      name="keywords"
      content="KNOBB, music app, music discovery, playlists, shared playlists, listening history, music streaming"
    />
    <meta name="robots" content="index, follow" />
    <meta name="application-name" content="KNOBB" />
    <meta name="author" content="KNOBB" />
    <meta name="theme-color" content="#1d0834" />
    <meta name="color-scheme" content="dark" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="msapplication-TileColor" content="#1d0834" />
    <link rel="icon" type="image/png" sizes="256x256" href="/brand/logo-k-black-square-256.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/brand/logo-k-black-square-512.png" />
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- Preload Critical Assets -->
    <link rel="preload" href="/brand/logo-k-black-square-256.png" as="image" />
    <script>
      (() => {
        try {
          const fontQueries = {
            Outfit: "family=Outfit:wght@400;500;600;700;800",
            Inter: "family=Inter:wght@400;500;600;700;800",
            Poppins: "family=Poppins:wght@400;500;600;700;800",
            Nunito: "family=Nunito:wght@400;500;600;700;800",
            "Space Grotesk": "family=Space+Grotesk:wght@400;500;600;700",
            Roboto: "family=Roboto:wght@400;500;700",
            "JetBrains Mono": "family=JetBrains+Mono:wght@400;500;700",
          };
          const systemStack = 'ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
          const font = window.localStorage.getItem("app-font");
          const fontQuery = font ? fontQueries[font] : null;

          if (!font || font === "System Default" || !fontQuery) {
            document.documentElement.style.setProperty("--font-sans", systemStack);
            return;
          }

          document.documentElement.style.setProperty("--font-sans", `"${font}", sans-serif`);

          const createLink = (id, rel, href, crossOrigin) => {
            if (document.getElementById(id)) return;
            const link = document.createElement("link");
            link.id = id;
            link.rel = rel;
            link.href = href;
            if (crossOrigin) link.crossOrigin = crossOrigin;
            document.head.appendChild(link);
          };

          createLink("knobb-fonts-preconnect", "preconnect", "https://fonts.googleapis.com");
          createLink("knobb-fonts-gstatic", "preconnect", "https://fonts.gstatic.com", "anonymous");
          createLink("knobb-fonts-stylesheet", "stylesheet", `https://fonts.googleapis.com/css2?${fontQuery}&display=swap`);
        } catch {}
      })();
    </script>

    <meta property="og:title" content="KNOBB" />
    <meta
      property="og:description"
      content="KNOBB is a modern music app for playlists, discovery, shared listening, and direct-source archives."
    />
    <meta property="og:site_name" content="KNOBB" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/brand/knobb-share.png" />
    <meta
      property="og:image:alt"
      content="KNOBB share card with a silver K mark and layered KNOBB wordmark in silver, yellow, and purple on black."
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="KNOBB" />
    <meta
      name="twitter:description"
      content="KNOBB is a modern music app for playlists, discovery, shared listening, and direct-source archives."
    />
    <meta name="twitter:image" content="/brand/knobb-share.png" />
    <meta

    />
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: linear-gradient(180deg, #090909 0%, #000 100%);
        color: rgba(255, 255, 255, 0.96);
        font-family: var(--font-sans, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      }

        min-height: 100vh;
