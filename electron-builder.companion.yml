appId: fm.knobb.discord-companion
productName: Knobb Discord Companion
directories:
  output: release/companion
files:
  - desktop/discord-companion/**/*
  - scripts/discord-presence-bridge-core.mjs
  - discord-presence.bridge.example.json
extraMetadata:
  main: desktop/discord-companion/main.mjs
publish:
  provider: github
  owner: MunasibApurbo
  repo: knobb-desktop
  releaseType: release
  vPrefixedTagName: true
  channel: companion
mac:
  artifactName: Knobb-Discord-Companion-macOS.${ext}
  category: public.app-category.music
  icon: desktop/knobb/assets/knobb.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  target:
    - target: dmg
      arch:
        - universal
    - target: zip
      arch:
        - universal
dmg:
  artifactName: Knobb-Discord-Companion-macOS.${ext}
win:
  artifactName: Knobb-Discord-Companion-Setup.${ext}
  icon: public/favicon.ico
  target:
    - target: nsis
      arch:
        - x64
nsis:
  artifactName: Knobb-Discord-Companion-Setup.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: false
  perMachine: false
