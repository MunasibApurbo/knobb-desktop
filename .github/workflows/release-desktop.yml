name: Release desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-macos:
    name: Release macOS desktop
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate signing secrets
        env:
          APPLE_CSC_LINK: ${{ secrets.APPLE_CSC_LINK }}
          APPLE_CSC_KEY_PASSWORD: ${{ secrets.APPLE_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$APPLE_CSC_LINK"
          test -n "$APPLE_CSC_KEY_PASSWORD"
          test -n "$APPLE_ID"
          test -n "$APPLE_APP_SPECIFIC_PASSWORD"
          test -n "$APPLE_TEAM_ID"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Decode macOS signing certificate
        env:
          APPLE_CSC_LINK: ${{ secrets.APPLE_CSC_LINK }}
        run: |
          if printf '%s' "$APPLE_CSC_LINK" | base64 --decode > "$RUNNER_TEMP/apple-signing-cert.p12" 2>/dev/null; then
            exit 0
          fi
          printf '%s' "$APPLE_CSC_LINK" | base64 -D > "$RUNNER_TEMP/apple-signing-cert.p12"

      - name: Publish macOS release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ runner.temp }}/apple-signing-cert.p12
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --publish always

  release-windows:
    name: Release Windows desktop
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate signing secrets
        shell: pwsh
        env:
          WINDOWS_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
          WINDOWS_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CSC_LINK)) { throw "Missing WINDOWS_CSC_LINK" }
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CSC_KEY_PASSWORD)) { throw "Missing WINDOWS_CSC_KEY_PASSWORD" }

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Decode Windows signing certificate
        id: decode_windows_cert
        shell: pwsh
        env:
          WINDOWS_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "windows-signing-cert.p12"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:WINDOWS_CSC_LINK))
          "cert_path=$certPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish Windows release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ steps.decode_windows_cert.outputs.cert_path }}
          CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: npx electron-builder --win --publish always
