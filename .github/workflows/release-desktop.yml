name: Release desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-macos:
    name: Release macOS desktop
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Check macOS signing prerequisites
        id: macos_release_prereqs
        env:
          APPLE_CSC_LINK: ${{ secrets.APPLE_CSC_LINK }}
          APPLE_CSC_KEY_PASSWORD: ${{ secrets.APPLE_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          missing=0
          for name in APPLE_CSC_LINK APPLE_CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then
              echo "::warning::$name is missing. Signed macOS publishing will be skipped."
              missing=1
            fi
          done
          if [ "$missing" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decode macOS signing certificate
        if: steps.macos_release_prereqs.outputs.ready == 'true'
        env:
          APPLE_CSC_LINK: ${{ secrets.APPLE_CSC_LINK }}
        run: |
          if [ -z "$APPLE_CSC_LINK" ]; then
            exit 0
          fi
          if printf '%s' "$APPLE_CSC_LINK" | base64 --decode > "$RUNNER_TEMP/apple-signing-cert.p12" 2>/dev/null; then
            exit 0
          fi
          printf '%s' "$APPLE_CSC_LINK" | base64 -D > "$RUNNER_TEMP/apple-signing-cert.p12"

      - name: Publish macOS release
        if: steps.macos_release_prereqs.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "${{ secrets.APPLE_CSC_LINK }}" ]; then
            export CSC_LINK="$RUNNER_TEMP/apple-signing-cert.p12"
            export CSC_KEY_PASSWORD="${{ secrets.APPLE_CSC_KEY_PASSWORD }}"
          fi
          npx electron-builder --mac --publish always

      - name: Package macOS Discord Companion
        if: steps.macos_release_prereqs.outputs.ready == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "${{ secrets.APPLE_CSC_LINK }}" ]; then
            export CSC_LINK="$RUNNER_TEMP/apple-signing-cert.p12"
            export CSC_KEY_PASSWORD="${{ secrets.APPLE_CSC_KEY_PASSWORD }}"
          fi
          npx electron-builder --config electron-builder.companion.yml --mac --publish never

      - name: Upload macOS Discord Companion assets
        if: startsWith(github.ref, 'refs/tags/v') && steps.macos_release_prereqs.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            release/companion/Knobb-Discord-Companion-macOS.dmg \
            release/companion/Knobb-Discord-Companion-macOS.zip \
            release/companion/companion-mac.yml \
            --clobber

      - name: Report skipped macOS publishing
        if: steps.macos_release_prereqs.outputs.ready != 'true'
        run: echo "Skipping signed macOS publishing because Apple signing credentials are not configured."

  release-windows:
    name: Release Windows desktop
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Decode Windows signing certificate
        id: decode_windows_cert
        shell: pwsh
        env:
          WINDOWS_CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CSC_LINK)) {
            exit 0
          }
          $certPath = Join-Path $env:RUNNER_TEMP "windows-signing-cert.p12"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:WINDOWS_CSC_LINK))
          "cert_path=$certPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish Windows release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if (-not [string]::IsNullOrWhiteSpace('${{ secrets.WINDOWS_CSC_LINK }}')) {
            $env:CSC_LINK = '${{ steps.decode_windows_cert.outputs.cert_path }}'
            $env:CSC_KEY_PASSWORD = '${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}'
          }
          npx electron-builder --win --publish always

      - name: Package Windows Discord Companion
        shell: pwsh
        run: |
          if (-not [string]::IsNullOrWhiteSpace('${{ secrets.WINDOWS_CSC_LINK }}')) {
            $env:CSC_LINK = '${{ steps.decode_windows_cert.outputs.cert_path }}'
            $env:CSC_KEY_PASSWORD = '${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}'
          }
          npx electron-builder --config electron-builder.companion.yml --win --publish never

      - name: Upload Windows Discord Companion assets
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$env:GITHUB_REF_NAME" release/companion/Knobb-Discord-Companion-Setup.exe release/companion/companion.yml --clobber
